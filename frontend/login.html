<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookMyCampus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="images/logo-icon.svg">
    
    <!-- Google SEO (Lighthouse) -->
    <meta name="description" content="Login to BookMyCampus to manage your facility bookings.">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    
    <!-- Google Identity (One Tap) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            // In a real app, send this to backend for verification
            alert('Google Sign-In successful! (Mock mode)');
            window.location.href = 'dashboard.html';
        }
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "318187560137-4s1i592vrd241ct8ctb8ueakpum270ei.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("google-signin-btn"),
                { theme: "outline", size: "large", width: "100%" }
            );
            google.accounts.id.prompt(); // also display the One Tap dialog
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="header">
                <div class="logo">
                    <img src="images/logo.png.png?v=3" alt="BookMyCampus" style="height: 120px; width: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); margin-bottom: 20px;">
                </div>
                <h1>BookMyCampus</h1>
                <p>Welcome back! Please login to your account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <div class="form-group" id="secretKeyGroup" style="display: none;">
                    <label for="secretKey">🔐 Admin Secret Key</label>
                    <input 
                        type="password" 
                        id="secretKey" 
                        name="secretKey" 
                        placeholder="Enter admin secret key"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

                <div class="divider"><span>OR</span></div>
                
                <!-- Google One Tap / Sign In Button -->
                <div id="google-signin-btn" style="margin-bottom: 20px;"></div>

                <p class="switch-auth">
                    Don't have an account? 
                    <a href="signup.html">Sign up here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="gemini-ai.js?v=3"></script>
</body>
</html>
