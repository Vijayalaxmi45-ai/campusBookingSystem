<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90">
  <defs>
    <linearGradient id="sunG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7941D"/>
      <stop offset="100%" style="stop-color:#ED6B23"/>
    </linearGradient>
  </defs>

  <!-- Background circle (sun) -->
  <circle cx="52" cy="30" r="30" fill="url(#sunG)" opacity="0.85"/>

  <!-- Green campus/trees -->
  <polygon points="35,50 45,25 55,50" fill="#4CAF50"/>
  <polygon points="55,50 63,30 71,50" fill="#388E3C"/>
  <polygon points="23,55 33,33 43,55" fill="#66BB6A"/>

  <!-- Clock Tower Building -->
  <rect x="53" y="27" width="18" height="35" fill="#C62828" rx="1"/>
  <rect x="55" y="23" width="14" height="6" fill="#D32F2F"/>
  <polygon points="55,23 62,13 69,23" fill="#B71C1C"/>
  <circle cx="62" cy="33" r="5" fill="#FFF9C4" stroke="#795548" stroke-width="0.8"/>
  <line x1="62" y1="33" x2="62" y2="30" stroke="#333" stroke-width="0.7"/>
  <line x1="62" y1="33" x2="64.5" y2="33" stroke="#333" stroke-width="0.7"/>
  <rect x="58" y="43" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="64" y="43" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="58" y="51" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="64" y="51" width="3" height="4" fill="#FFCC80" rx="0.5"/>

  <!-- Main campus building -->
  <rect x="25" y="45" width="38" height="17" fill="#4CAF50" rx="1"/>
  <rect x="29" y="48" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="37" y="48" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="45" y="48" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="39" y="54" width="6" height="8" fill="#2E7D32" rx="0.5"/>

  <!-- Open Book -->
  <g transform="translate(10, 50)">
    <path d="M 40,18 Q 22,11 5,16 L 5,0 Q 22,-5 40,2 Z" fill="#FAFAFA" stroke="#999" stroke-width="0.5"/>
    <path d="M 40,18 Q 58,11 75,16 L 75,0 Q 58,-5 40,2 Z" fill="#F5F5F5" stroke="#999" stroke-width="0.5"/>
    <line x1="40" y1="2" x2="40" y2="18" stroke="#999" stroke-width="0.6"/>
  </g>

  <!-- Blue swoosh -->
  <path d="M 5,72 Q 50,62 95,72" fill="none" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 7,75 Q 50,66 93,75" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round"/>

  <!-- Graduation Cap -->
  <g transform="translate(5, 13)">
    <polygon points="28,8 3,18 28,26 53,18" fill="#1A237E"/>
    <polygon points="28,10 8,18 28,24 48,18" fill="#283593" opacity="0.6"/>
    <line x1="28" y1="18" x2="6" y2="26" stroke="#F9A825" stroke-width="1.2"/>
    <rect x="2" y="26" width="4" height="6" fill="#F9A825" rx="1"/>
    <rect x="16" y="22" width="24" height="3" fill="#1A237E" rx="0.5"/>
  </g>
</svg>
