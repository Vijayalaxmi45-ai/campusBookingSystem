<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7941D"/>
      <stop offset="100%" style="stop-color:#ED6B23"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7941D;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle (sun) -->
  <circle cx="55" cy="35" r="32" fill="url(#sunGrad)" opacity="0.85"/>

  <!-- Green campus/trees -->
  <polygon points="40,55 50,30 60,55" fill="#4CAF50"/>
  <polygon points="60,55 68,35 76,55" fill="#388E3C"/>
  <polygon points="28,60 38,38 48,60" fill="#66BB6A"/>

  <!-- Clock Tower Building -->
  <rect x="58" y="32" width="18" height="35" fill="#C62828" rx="1"/>
  <rect x="60" y="28" width="14" height="6" fill="#D32F2F"/>
  <polygon points="60,28 67,18 74,28" fill="#B71C1C"/>
  <!-- Clock face -->
  <circle cx="67" cy="38" r="5" fill="#FFF9C4" stroke="#795548" stroke-width="0.8"/>
  <line x1="67" y1="38" x2="67" y2="35" stroke="#333" stroke-width="0.7"/>
  <line x1="67" y1="38" x2="69.5" y2="38" stroke="#333" stroke-width="0.7"/>
  <!-- Tower windows -->
  <rect x="63" y="48" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="69" y="48" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="63" y="56" width="3" height="4" fill="#FFCC80" rx="0.5"/>
  <rect x="69" y="56" width="3" height="4" fill="#FFCC80" rx="0.5"/>

  <!-- Main campus building -->
  <rect x="30" y="50" width="38" height="17" fill="#4CAF50" rx="1"/>
  <rect x="34" y="53" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="42" y="53" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="50" y="53" width="4" height="5" fill="#FFCC80" rx="0.5"/>
  <rect x="44" y="59" width="6" height="8" fill="#2E7D32" rx="0.5"/>

  <!-- Open Book -->
  <g transform="translate(15, 55)">
    <!-- Left page -->
    <path d="M 45,20 Q 25,12 5,18 L 5,0 Q 25,-6 45,2 Z" fill="#FAFAFA" stroke="#999" stroke-width="0.5"/>
    <!-- Right page -->
    <path d="M 45,20 Q 65,12 85,18 L 85,0 Q 65,-6 45,2 Z" fill="#F5F5F5" stroke="#999" stroke-width="0.5"/>
    <!-- Page lines left -->
    <line x1="15" y1="5" x2="40" y2="3" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="13" y1="8" x2="40" y2="6" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="12" y1="11" x2="40" y2="9" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="11" y1="14" x2="38" y2="12" stroke="#BDBDBD" stroke-width="0.4"/>
    <!-- Page lines right -->
    <line x1="50" y1="3" x2="75" y2="5" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="50" y1="6" x2="77" y2="8" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="50" y1="9" x2="78" y2="11" stroke="#BDBDBD" stroke-width="0.4"/>
    <line x1="51" y1="12" x2="79" y2="14" stroke="#BDBDBD" stroke-width="0.4"/>
    <!-- Book spine -->
    <line x1="45" y1="2" x2="45" y2="20" stroke="#999" stroke-width="0.6"/>
  </g>

  <!-- Blue swoosh under book -->
  <path d="M 10,78 Q 55,68 100,78" fill="none" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 12,81 Q 55,72 98,81" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round"/>

  <!-- Graduation Cap -->
  <g transform="translate(10, 18)">
    <!-- Cap top (diamond shape) -->
    <polygon points="30,10 5,20 30,28 55,20" fill="#1A237E"/>
    <!-- Cap top highlight -->
    <polygon points="30,12 10,20 30,26 50,20" fill="#283593" opacity="0.6"/>
    <!-- Tassel string -->
    <line x1="30" y1="20" x2="8" y2="28" stroke="#F9A825" stroke-width="1.2"/>
    <!-- Tassel end -->
    <rect x="4" y="28" width="4" height="6" fill="#F9A825" rx="1"/>
    <line x1="5" y1="34" x2="5" y2="38" stroke="#F9A825" stroke-width="0.8"/>
    <line x1="7" y1="34" x2="7" y2="37" stroke="#F9A825" stroke-width="0.8"/>
    <!-- Cap bottom strip -->
    <rect x="18" y="24" width="24" height="3" fill="#1A237E" rx="0.5"/>
  </g>

  <!-- BookMyCampus Text -->
  <text x="120" y="52" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="36">
    <tspan fill="#1A237E">Book</tspan><tspan fill="#4CAF50">My</tspan><tspan fill="#F57C00">Campus</tspan>
  </text>

  <!-- Tagline -->
  <text x="120" y="74" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="2">
    <tspan fill="#4527A0">RESERVE</tspan>
    <tspan fill="#666"> • </tspan>
    <tspan fill="#4527A0">LEARN</tspan>
    <tspan fill="#666"> • </tspan>
    <tspan fill="#4527A0">ACHIEVE</tspan>
  </text>
</svg>
